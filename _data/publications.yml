  pdf_path: /papers/publications/Strategic%20decision-making%20in%20Hollywood%20release%20gaps.pdf
  abstract: "Hollywood blockbusters are usually released in the U.S. before other foreign markets. The release gaps have declined signi\uFB01cantly over time and varied greatly across countries.While movie piracy has been suggested as an important determinant for the release gap decision of distributors, theory and evidence suggest that there are other important determinants. In this paper, we use a discrete choice release gap decision game model to disentangle the impacts of the i) release gap effect, which includes factors that provide incentives for a distributor to shorten the release gap; ii) word-of-mouth effect, which provides incentives for a distributor to lengthen the release gap; and iii) competition effect, which accounts for the incentives blockbustershavetoavoideachother.Weobtainboxo\uFB03ceandreleasegapdatafromtheprivateindustrysource Boxo\uFB03cemojo.com. We provide results on the economically signi\uFB01cant impact of these three factors on distributors\u2019 release gap\
    \ decisions and box o\uFB03ce revenue."
  fulltext_hash: f1683926d18d997f6c0e1bf4669e423f1881daab35c64898c4764418695e4c0b
  fulltext_excerpt: "Journal of International Economics 105 (2017) 10\u201321\nContents lists available at ScienceDirect\nJournal of International Economics\njournal homepage: www.elsevier.com/locate/jie\nStrategic decision-making in Hollywood release gaps/H22845\nJohn T. Dalton*, Tin Cheuk Leung\nDepartment of Economics, Kirby Hall, Wake Forest University, Box 7505, Winston-Salem, NC 27109, United States\nARTICLE INFO\nArticle history:\nReceived 13 January 2016\nAccepted 22 November 2016\nAvailable online 7 December 2016\nJEL classi\uFB01cation:\nF14\nL82\n034\nKeywords:\nHollywood\nMovie exports\nRelease gap\nIntellectual property rights\nABSTRACT\nHollywood blockbusters are usually released in the U.S. before other foreign markets. The release gaps have\ndeclined signi\uFB01cantly over time and varied greatly across countries.While movie piracy has been suggested\nas an important determinant for the release gap decision of distributors, theory and evidence suggest that\nthere are other\
    \ important determinants. In this paper, we use a discrete choice release gap decision game\nmodel to disentangle the impacts of the i) release gap effect, which includes factors that provide incen-\ntives for a distributor to shorten the release gap; ii) word-of-mouth effect, which provides incentives for a\ndistributor to lengthen the release gap; and iii) competition effect, which accounts for the incentives block-\nbustershavetoavoideachother.Weobtainboxo\uFB03ceandreleasegapdatafromtheprivateindustrysource\nBoxo\uFB03cemojo.com. We provide results on the economically signi\uFB01cant impact of these three factors on\ndistributors\u2019 release gap decisions and box o\uFB03ce revenue.\n\xA9 2016 Elsevier B.V. All rights reserved.\n1. Introduction\nMovie executives fear the collapse of Hollywood exports in the\nface of rising worldwide piracy rates. Yet box o\uFB03ce sales growth\nremains stable. According to the Motion Picture Association of\nAmerica (MPAA), U.S./Canadian and international\
    \ box o\uFB03ce sales\ngrew 12% and 32% between 2008 and 2012.\n1\nOne characteristic of the movie industry often mentioned in con-\nnectionwithpiracyisthereleasegapbetweenwhenamovieappears\nin the U.S. and a foreign market. Hollywood studios try to preempt\npiracy by releasing movies as quickly as possible. Industry observers\noftennotethedeclineinmoviereleasegapsworldwide,apointmade\nby Eliashberg et al. (2006). Looking at the years 1980, 1990, 2000,\nand 2010, for example, we observe this trend when comparing the\naverage release gap for those top ten box o\uFB03ce hits from the U.S.\n/H22845We thank Liran Einav for sharing his codes, Christina Marsh Dalton for her many\nhelpful comments, and Douglas Cheng,"
