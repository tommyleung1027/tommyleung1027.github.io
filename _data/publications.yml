    \ the 2014 NBER\nEconomics of Digitization Winter Meeting, the 2014 NET Institute Confer-\nence on Network Economics, the 2015 Asia Paci\uFB01c Innovation Conference,\nand the Fifth Annual Conference on Internet Search and Innovation. All\nerrors are our own.\n\u2217 Corresponding author.\nE-mail addresses: jinhyuk.kim@colorado.edu (J.-H. Kim),\nleungtc@wfu.edu (T.C. Leung).\ncal format to the digital, a new form of copyright manage-\nment system has been widely adopted by market partic-\nipants in the past couple of decades: Cryptographic engi-\nneering allowed rights holders to directly control access to\nand use of copyrighted works via Digital Rights Manage-\nment (DRM). Speci\uFB01cally, a DRM system"
