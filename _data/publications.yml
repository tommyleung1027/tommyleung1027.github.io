- id: pub-what-can-regulators-deregulate-the-case-of-electricity
  title: What Can Regulators Deregulate? The Case of Electricity,
  authors:
  - Leung
  - T.C.
  - K.P. Tsang
  - K. K. Tsui
  year: 2019
  date: '2019'
  type: publication
  external_url: https://link.springer.com/article/10.1007/s11149-019-09386-9
  pdf_path: /papers/publications/What%20can%20deregulators%20deregulate%3F%20The%20case%20of%20electricity.pdf
  abstract: "We revisit Stigler and Friedland\u2019s (J Law Econ 5:1\u201316, 1962) seminal paper by examining how competitive generation affects prices, sustainability, and reliability in the electricity industry. Exploiting state and year variation in the introduction of regional transmission organizations (RTOs) that facilitate open access to transmission, we first show that wholesale market deregulation significantly increases the prevalence of independent power producers (IPPs). Using RTO membership as an instrument, we find that IPP entry fails to cut electricity prices paid by consumers. This non-result is also robust to using initial electricity tariffs as an instrument for changes in IPP in a long-difference specification. We provide suggestive evidence that the absence of consumer gain can be attributed to efficiency loss due to mandated divestiture of generation assets or simply higher upstream transaction costs. But, increased prevalence of IPPs is associated with more solar\
    \ and hydropower, although the use of non-fossil fuel as a whole remains unchanged because less nuclear power is used. More IPPs, however, is also associated with less reliable electricity supply. A review of the origins of electricity deregulation suggests that this tradeoff between environmental sustainability and energy security is not likely to have been the major determinant of the deregulation. Rather than a pro-consumer deregulation, the regulatory change is perhaps more appropriately interpreted as a regulatory capture that benefits IPP entrants and existing energy marketers."
  fulltext_hash: 828db94a34a4ce68c28e2d41610b40dddd03ffecbd5732df258490ebd3cb7293
  fulltext_excerpt: "Vol.:(0123456789)\nJournal of Regulatory Economics (2019) 56:1\u201332\nhttps://doi.org/10.1007/s11149-019-09386-9\n1 3\nORIGINAL ARTICLE\nWhat can deregulators deregulate? The case of electricity\nTin Cheuk Leung1 \xB7 Kwok Ping Ping2 \xB7 Kevin K. Tsui3,4\nPublished online: 5 August 2019\n\xA9 Springer Science+Business Media, LLC, part of Springer Nature 2019\nAbstract\nWe revisit Stigler and Friedland\u2019s (J Law Econ 5:1\u201316, 1962) seminal paper by\nexamining how competitive generation affects prices, sustainability, and reliability\nin the electricity industry. Exploiting state and year variation in the introduction of\nregional transmission organizations (RTOs) that facilitate open access to transmis-\nsion, we first show that wholesale market deregulation significantly increases the\nprevalence of independent power producers (IPPs). Using RTO membership as an\ninstrument, we find that IPP entry fails to cut electricity prices paid by consumers.\nThis non-result\
    \ is also robust to using initial electricity tariffs as an instrument for\nchanges in IPP in a long-difference specification. We provide suggestive evidence\nthat the absence of consumer gain can be attributed to efficiency loss due to man-\ndated divestiture of generation assets or simply higher upstream transaction costs.\nBut, increased prevalence of IPPs is associated with more solar and hydropower,\nalthough the use of non-fossil fuel as a whole remains unchanged because less\nnuclear power is used. More IPPs, however, is also associated with less reliable elec-\ntricity supply. A review of the origins of electricity deregulation suggests that this\ntradeoff between environmental sustainability and energy security is not likely to\nhave been the major determinant of the deregulation. Rather than a pro-consumer\nderegulation, the regulatory change is perhaps more appropriately interpreted as a\nregulatory capture that benefits IPP entrants and existing energy marketers.\nKeywords\
    \ Energy trilemma \xB7 Independent power producers \xB7 Deregulation\nJEL Classification K23 \xB7 L22 \xB7 L25 \xB7 L43\nWe would like to thank Bill Dougan, Nic Tideman, Maggie Wang and seminar participants at\nClemson University for helpful comments.\n* Kevin K. Tsui\nktsui@clemson.edu\n1 Wake Forest University, Winston-Salem, USA\n2 Virginia Tech, Blacksburg, USA\n3 Clemson University, Clemson, USA\n4 Zhongnan University of Economics and Law, Wuhan, China\n\n2 T. C. Leung et al.\n1 3\n1 Introduction\nThe Energy Trilemma\u2014a term coined by the World Energy Council\u2014highlights the\ntradeoffs among energy equity (i.e., affordability of energy supply), environmental\nsustainability (i.e., develo"
