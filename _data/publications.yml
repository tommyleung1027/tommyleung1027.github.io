- id: pub-eliminating-digital-rights-management-in-the-e-book-market
  title: Eliminating Digital Rights Management in the E-Book Market,
  authors:
  - Kim
  - J.H.
  - T.C. Leung
  year: 2021
  date: '2021'
  type: publication
  external_url: https://doi.org/10.1016/j.infoecopol.2021.100935
  pdf_path: /papers/publications/Eliminating%20digital%20rights%20management%20from%20the%20E-book%20market.pdf
  abstract: "We examine the impact of removing Digital Rights Management (DRM) from electronic book devices. We derive a Bayesian hierarchical logit model based on the consumer\u2019s utility maximization problem and estimate the model using data from a choice-based survey. We then simulate the counterfactual market outcomes when DRM is removed; on average, the consumer surplus increases nontrivially holding everything else constant. However, the gain in consumer surplus is diminished when we re-calibrate e-book device prices. Further, if there is a negative shock to content supply, then the consumer surplus could in fact decrease after DRM removal."
  fulltext_hash: 72104368f7df88babd07e3a48b8c6fe543e7f4ec88ce620eebbccc6933ee5fc9
