  abstract: ". We offer an explanation of why changes in house price are predictable. We consider a housing market with loss-averse sellers and anchoring buyers in a dynamic setting. We show that when both cognitive biases are present, changes in house prices are predicted by price dispersion and trade volume. Using a sample of housing transactions in Hong Kong from 1992 to 2006, we \uFB01nd that price dispersion and transaction volume are, indeed, powerful predictors of housing return. For both in and out of sample, the two variables predict as well as conventional predictors such as the real interest rate and real stock return."
  fulltext_hash: 28d2f7883798793683d24c1f0c5bec5b63a17a8df61afe65fda74f6c125af464
  fulltext_excerpt: "CAN ANCHORING AND LOSS AVERSION EXPLAIN THE\nPREDICTABILITY OF HOUSING PRICES?\nTIN CHEUK LEUNG* Chinese University of Hong Kong\nKWOK PING TSANG Virginia Tech\nAbstract. We offer an explanation of why changes in house price are predictable. We consider a\nhousing market with loss-averse sellers and anchoring buyers in a dynamic setting. We show that\nwhen both cognitive biases are present, changes in house prices are predicted by price dispersion and\ntrade volume. Using a sample of housing transactions in Hong Kong from 1992 to 2006, we \uFB01nd that\nprice dispersion and transaction volume are, indeed, powerful predictors of housing return. For both\nin and out of sample, the two variables predict as well as conventional predictors such as the real\ninterest rate and real stock return.\n1. INTRODUCTION\nThe Hong Kong housing market is famous for its large number of transactions\nand sharp \uFB02uctuations in prices. The average price per square foot in 2006 Hong\n\
    Kong dollars (HKD) rose from approximately HKD4000 in 1996 to almost\nHKD7000 in 1997; 3 years later, in 2000, the average price had dropped to\naround HKD3000 (see Figure 2). By 2003, there was another upward trend in\nhouse prices. The large swings in house prices in Hong Kong have motivated\nstudies on whether they can be explained by movements in economic fundamen-\ntals. Typically, house prices in Hong Kong are explained by variables including\nreal GDP, the real interest rate, land supply, population growth and real stock\nreturn. Peng (2002) shows that, in addition to variables like GDP, the real\ninterest rate and the exchange rate, demographic changes and housing supply\nare important factors that affect house prices in Hong Kong. Leung et al. (2008)\ncon\uFB01rm that GDP, the real interest rate, land supply and the residential invest-\nment de\uFB02ator are important determinants of long-run house prices in Hong\nKong, and they also \uFB01nd equity prices to be relevant in\
    \ the short run. Glindro\net al. (2007), using a panel of Asia-Paci\uFB01c economies that includes Hong Kong,\nalso conclude that house prices in Hong Kong can be explained largely by\nmacroeconomic fundamentals.\nWhile most studies on the Hong Kong housing market focus on the long run\nand fundamentals, and mostly on the level of house prices, our paper offers an\nalternative and complementary investigation into the short-term changes in\n*Address for Correspondence : Department of Economics, Chinese University of Hong Kong, 914\nEsther Lee Building, Chung Chi Campus, Shatin, Hong Kong. Email: tleung@cuhk.edu.hk.\nThis work was partly undertaken while the second author was visit"
