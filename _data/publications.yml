- id: pub-why-are-inferior-seats-underpriced-evidence-from-the-english-premier-league
  title: Why Are Inferior Seats "Underpriced"? Evidence from the English Premier League
  authors:
  - Leung
  - T.C.
  - K.P. Tsang
  - K. K. Tsui
  year: 2020
  date: '2020'
  type: publication
  external_url: https://www.degruyter.com/view/journals/me/7/1/article-20200007.xml
  pdf_path: /papers/publications/Why%20Are%20Inferior%20Seats%20%E2%80%9CUnderpriced%E2%80%9D%3F%20Evidence%20from%20the%20English%20Premier%20League.pdf
  abstract: This paper studies the practice of loss-leader pricing strategy in the English Premier League (EPL). While the TV broadcasting revenue for EPL clubs has increased over the past 20 years, the importance of revenue from ticket sales has declined. The theory of multi-product pricing suggests that a change in the relative importance of revenue sources can induce profit-maximizing firms to underprice one product in order to raise the demand for a complementary one. Using other leagues in England and Scotland that do not have as much TV broadcasting revenue as a control group, we find that inferior seats are underpriced among the ELP clubs. Consistent with the growing importance of TV broadcast revenue, we also find that such "loss-leader pricing" is stronger in later years of the sample. Furthermore, we provide evidence that the underpricing of inferior seats is more pronounced in (i) EPL clubs compared to clubs in other European leagues; (ii) elite clubs in ELP compared to non-elite
    clubs in ELP that have less TV broadcasting revenue; and (iii) clubs promoted to ELP as compared to clubs that are either promoted or relegated to different leagues in England and Scotland. These findings suggest that clubs that rely more on TV broadcasting underprice their inferior seats as loss leader to attract more passionate fans.
  fulltext_hash: 33b59581fed0b79d0e6d603c2e9b7699b04cd047585e60c872634c1a89a94137
  fulltext_excerpt: "1\nWhy Are Inferior Seats \u201CUnderpriced\u201D? Evidence from the English Premier League* Tin Cheuk Leung Wake Forest University leungtc@wfu.edu\nKwok Ping Tsang Virginia Tech byront@vt.edu September 28, 2018\nKevin K. Tsui Clemson University ktsui@clemson.edu\nAbstract This paper studies the practice of loss-leader pricing strategy in the English Premier League (EPL). While the TV broadcasting revenue for EPL clubs has increased over the past 20 years, the importance of revenue from ticket sales has declined. The theory of multi-product pricing suggests that a change in the relative importance of revenue sources can induce profit-maximizing firms to underprice one product in order to raise the demand for a complementary one. Using other leagues in England and Scotland that do not have as much TV broadcasting revenue as a control group, we find that inferior seats are underpriced among the ELP clubs. Consistent with the growing importance of TV broadcast revenue,\
    \ we also find that such \"loss-leader pricing\" is stronger in later years of the sample. Furthermore, we provide evidence that the underpricing of inferior seats is more pronounced in (i) EPL clubs compared to clubs in other European leagues; (ii) elite clubs in ELP compared to non-elite clubs in ELP that have less TV broadcasting revenue; and (iii) clubs promoted to ELP as compared to clubs that are either promoted or relegated to different leagues in England and Scotland. These findings suggest that clubs that rely more on TV broadcasting underprice their inferior seats as loss leader to attract more passionate fans. JEL codes: D22; L11; L83 Keywords: loss-leader pricing; English Premier League; cross-subsidization\n* We thank Cloud Yip for first introducing us to this topic. We also thank John T. Dalton and the seminar participants at Clemson, College of William and Mary, CMES, IIOC and Wake Forest for helpful comments. We also thank Tom Lam for providing attendance data of English\
    \ league games. The usual disclaimer applies.\n\n2\n\u201CFor every pound that you lower the ticket price, if you can recover it in that home advantage, you maybe won\u2019t have a loss.\u201D Vincent Kompany (Captain of Manchester City) 2018 1. Introduction Nowadays, the business model of most major sports leagues relies on multiple sources of revenue. While ticket sales still generates significant revenue for these leagues, TV broadcasting fee often is a major source of their total revenue. The English Premier League (EPL) is a prime example of such business model. Figure 1 shows that between the 2012/13 and 2017/18 seasons, season/matchday ticke"
