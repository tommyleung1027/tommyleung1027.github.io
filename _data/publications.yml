- id: pub-tax-driven-bunching-of-housing-market-transactions-the-case-of-hong-kong
  title: 'Tax-driven Bunching of Housing Market Transactions: The Case of Hong Kong,'
  authors:
  - Leung
  - C.K.Y.
  - T.C. Leung
  - K.P. Tsang
  year: 2015
  date: '2015'
  type: publication
  external_url: ''
  pdf_path: /papers/publications/Tax-driven%20Bunching%20of%20Housing%20Market%20Transactions-%20The%20Case%20of%20Hong%20Kong.pdf
  abstract: "We study the implications of a property market transaction tax. As property buyers are obligated to pay a transaction tax (\u201Cstamp duty\u201D or SD) where the rate increases with the value of the transaction, there are incentives to trade at the cutoff points of the tax schedule or just below them. Thus, both \u201Cbunching in transactions\u201D and \u201Cunderpricing\u201D should be observed near those cutoffs. Furthermore, the bunching points should change with the tax schedule. We confirm these conjectures with a rich dataset from the Hong Kong housing market and provide a measure of tax avoidance."
  fulltext_hash: 9aeb404f6cb1bb68571bba098c233744bfbc0aa4154d275a142347e3e4e7cdc3
  fulltext_excerpt: "Tax-driven Bunching of Housing Market Transactions 473\n\nINTERNATIONAL REAL ESTATE REVIEW\n2015 Vol. 18 No. 4: pp. 473 \u2013 501\n\nTax-driven Bunching of Housing Market\nTransactions: The Case of Hong Kong\n\nCharles Ka Yui Leung*\nDepartment of Economics and Finance, City University of Hong Kong.\nEmail: kycleung@cityu.edu.hk\n\nTin Cheuk Leung\nDepartment of Economics, Chinese University of Hong Kong.\nEmail: tleung@cuhk.edu.hk\n\nKwok Ping Tsang\nDepartment of Economics, Virginia Tech. Email: byrontkp@gmail.com\n\nWe study the implications of a property market transaction tax. As\nproperty buyers are obligated to pay a transaction tax (\u201Cstamp duty\u201D or\nSD) where the rate increases with the value of the transaction, there\nare incentives to trade at the cutoff points of the tax schedule or just\nbelow them. Thus, both \u201Cbunching in transactions\u201D and \u201Cunderpricing\u201D\nshould be observed near those cutoffs. Furthermore, the bunching\npoints\
    \ should change with the tax schedule. We confirm these\nconjectures with a rich dataset from the Hong Kong housing market\nand provide a measure of tax avoidance.\n\nKeywords\uFF1A\n\nBunching, Change in Nonlinear Tax Schedule, Housing Market, Tax\nAvoidance and Tax Evasion, Underpricing\n\n* Corresponding author\n\n474 Leung, Leung and Tsang\n\nAn increased surcharge the Singaporean government has assessed on most\nforeign buyers to try to tamp down soaring property prices threatens to rattle\nSingapore\u2019s uneasy relationship with many of its rich foreigners while giving\nAmericans an edge in one of Asia\u2019s hottest property markets. This month, the\ngovernment boosted to 15% from 10% the fee added to the purchase price of\nresidential property bought by many foreign nationals, including the Chinese,\nwho were the second -largest group of foreign buyers las t year\u2026 The\ngovernment worries that foreign buying is introducing the risk of a market\nbubble and making homes less\
    \ affordable for Singaporeans, which is feeding a\ngrowing resentment of foreigners.\n\n\u2013 Wall Street Journal (2013)\n\n1. Introduction\n\nIn this paper, we attempt to contribute to several strands of the literature by\nstudying how a nonlinear tax schedule affects the behavior of property sellers\nand buyers. As the Wall Street Journal (2013) quotation reflects, there is the\nbelief that introducing a transaction tax on the property market could\ncontribute to \u201Ctaming the property market bubble\u201D. Clearly, the idea can be\ntraced back to the so -called \u201CTobin tax\u201D, as explained by Tobin (1978)\nhimself,1 or even to Keynes (1936). 2 While this may be a clever policy in\nresponse to an \u201Coverheated\u201D asset market, it poses cha"
  citation: 'Leung, C.K.Y., T.C. Leung, and K.P. Tsang (2015): "Tax-driven Bunching of Housing Market Transactions: The Case of Hong Kong," International Real Estate Review, 18(4), pp. 473-501.'
