- id: pub-movie-industry-demand-and-theater-availability
  title: Movie Industry Demand and Theater Availability,
  authors:
  - Leung
  - T.C.
  - S. Qi
  - J. Yuan
  year: 2020
  date: '2020'
  type: publication
  external_url: http://link.springer.com/article/10.1007/s11151-019-09706-5
  pdf_path: /papers/publications/Movie%20Industry%20Demand%20and%20Theater%20Availability.pdf
  abstract: Consumers can only choose to see a movie if it is available in theaters. Explicitly taking into account movie theater availability, we estimate a structural model of movie demand with the use of U.S. movie data from 1995 to 2017. Estimation results indicate that the impact of theater availability on movie demand is both statistically and economically significant. We also find that movie budget predictions based on the model that incorporates theater availability is more consistent with the data, while the model that ignores theater availability on average over-predict production budgets.
  fulltext_hash: b5d9b90f22542385a6d4ca454a9fe291fa8ec1f52eb318659c1c18419cdbf278
  fulltext_excerpt: "Vol.:(0123456789)\nReview of Industrial Organization (2020) 56:489\u2013513\nhttps://doi.org/10.1007/s11151-019-09706-5\n1 3\nMovie Industry Demand and Theater Availability\nTin Cheuk Leung1 \xB7 Shi Qi2 \xB7 Jia Yuan3\nPublished online: 10 June 2019\n\xA9 Springer Science+Business Media, LLC, part of Springer Nature 2019\nAbstract\nConsumers can only choose to see a movie if it is available in theaters. Explic-\nitly taking into account movie theater availability, we estimate a structural model\nof movie demand with the use of U.S. movie data from 1995 to 2017. Estimation\nresults indicate that the impact of theater availability on movie demand is both sta-\ntistically and economically significant. We also find that movie budget predictions\nbased on the model that incorporates theater availability is more consistent with the\ndata, while the model that ignores theater availability on average over-predict pro-\nduction budgets.\nKeywords Movie demand \xB7 Theater availability\
    \ \xB7 Demand estimation\n1 Introduction\nConsumers can choose to see a movie only if it is available in theaters; hence theater\navailability is an important determinant of movie box-office performances. For\nexample, two movies\u2014Everyone Says I Love You and My Best Friend\u2019s Wedding\u2014\nshare the same release year (1997), star actress (Julia Roberts), and genre (Roman-\ntic Comedy), as well as a similar storyline. Despite having a less positive review,\n1\nthe latter was released in far more theaters\u20142134\u2014compared to 268 for the former\n* Tin Cheuk Leung\nleungtc@wfu.edu\nShi Qi\nsqi01@wm.edu\nJia Yuan\njiayuan@umac.mo\n1 Wake Forest University, Box 7505, Winston-Salem, NC 27109, USA\n2 College of William and Mary, Williamsburg, VA, USA\n3 University of Macau, Zhuhai, China\n1 Everyone Says I Love You has a rating of 6.8/10 on IMDb, compared to 6.3/10 for My Best Friend\u2019s\nWedding.\n\n490 T. C. Leung et al.\n1 3\nin the opening weeks and had a significantly\
    \ higher box-office revenue\u2014$127 mil-\nlion\u2014compared to $10 million. Through its impact on movie demand, theater avail-\nability could significantly affect movie production and investment decisions.\n2\nTo study the impact of theater availability on movie demand, we construct a\nstructural model that explicitly incorporates theater availability. We estimate the\ndemand model with the use of U.S. movie data from 1995 to 2017. Estimation\nresults indicate that the impact of theater availability on movie demand is both sta-\ntistically and economically significant. We find that ignoring theater availability can\nsignificantly bias the estimated impact of movie production budgets on box-office\nperformances"
