- id: pub-what-is-the-true-loss-due-to-piracy-evidence-from-microsoft-office-in-hong-kong
  title: What is the True Loss Due to Piracy? Evidence from Microsoft Office in Hong Kong,
  authors:
  - Leung
  - T.C.
  year: 2013
  date: '2013'
  type: publication
  external_url: http://www.mitpressjournals.org/doi/abs/10.1162/REST_a_00290
  pdf_path: /papers/publications/What%20Is%20the%20True%20Loss%20Due%20to%20Piracy%3F%20Evidence%20from%20Microsoft%20Office%20in%20Hong%20Kong.pdf
  abstract: "\u2014Using a unique conjoint data set drawn from 281 college students in Hong Kong, I estimate a random-coef\uFB01cient discrete choice demand system for Microsoft Of\uFB01ce from legal and various illegal sources. Counterfactual results show two things. First, most students would switch to Internet piracy even if the government eradicated street piracy. This explains why software piracy in Hong Kong remains well above 40% despite the government\u2019s successful measures to bring down street piracy. Second, the true gain from shutting off all sources of piracy is HK$48.6 (US$6) per person, only 15% of the Business Software Alliance\u2019s estimated cost of piracy."
  fulltext_hash: 981a1a94a508121928da7e9badb21ad8ae469f116cb9af59f8a016694303e171
  fulltext_excerpt: "WHAT IS THE TRUE LOSS DUE TO PIRACY?\nEVIDENCE FROM MICROSOFT OFFICE IN HONG KONG\nTin Cheuk Leung*\nAbstract\u2014Using a unique conjoint data set drawn from 281 college stu-\ndents in Hong Kong, I estimate a random-coef\uFB01cient discrete choice demand\nsystem for Microsoft Of\uFB01ce from legal and various illegal sources. Counter-\nfactual results show two things. First, most students would switch to Internet\npiracy even if the government eradicated street piracy. This explains why\nsoftware piracy in Hong Kong remains well above 40% despite the govern-\nment\u2019s successful measures to bring down street piracy. Second, the true\ngain from shutting off all sources of piracy is HK$48.6 (US$6) per person,\nonly 15% of the Business Software Alliance\u2019s estimated cost of piracy.\nI. Introduction\nA\nS a member of the World Trade Organization since 1995,\nHong Kong has been actively enforcing the copyright\nlaw required by the Agreement on Trade-Related Aspects\n\
    of Intellectual Property Rights. The Prevention of Copy-\nright Piracy Ordinance, enacted in 1998, requires all optical\ndisc factories in Hong Kong to obtain manufacturer licenses.\nThese factories are also subject to frequent inspection. An\namendment of the same ordinance in 2002 further requires\nmanufactures of stampers (\u201Cmaster discs\u201D) in Hong Kong to\nobtain licenses from the Hong Kong Customs and Excise\nDepartment. The ordinance, together with efforts to crack\ndown on syndicates of retail shops selling pirated software\napplications, has to a large extent eradicated street piracy in\nHong Kong. As table 1 shows, the number of retail shops\nengaged in piracy dropped dramatically from about one\nthousand in 1998 to fewer than ten in 2010.\nThe almost total disappearance of street piracy, however,\nhas not been accompanied by a corresponding slump in\noverall software piracy. According to the Business Soft-\nware Alliance (BSA), the software piracy rate in Hong Kong\n\
    declined from 59% in 1998 to only 45% in 2010.\n1 One of the\nmain reasons is that people increasingly substitute a pirated\ncopy of software from a retail shop with a pirated copy\ndownloaded from the Internet.\nThe lower cost of accessing the Internet, peer-to-peer (P2P)\n\uFB01le-sharing software such as BitTorrent (BT), and close-to-\nzero risk of persecution are among the factors contributing\nReceived for publication September 9, 2010. Revision accepted for\npublication March 29, 2012.\n* Leung: Chinese University of Hong Kong.\nI am indebted to my thesis advisor, Pat Bajari, for his continuous encour-\nagement and support. I thank Tom Holmes, Kyoo il Kim, participants in the\nHKUST applie"
