- id: pub-music-piracy-bad-for-record-sales-but-good-for-the-ipod
  title: 'Music Piracy: Bad for Record Sales but Good for the iPod?'
  authors:
  - Leung
  - T.C.
  year: 2015
  date: '2015'
  type: publication
  external_url: http://www.sciencedirect.com/science/article/pii/S0167624515000116
  pdf_path: /papers/publications/Music%20piracy-%20Bad%20for%20record%20sales%20but%20good%20for%20the%20iPod%3F.pdf
  abstract: "Music piracy is a double-edged sword for the music industry. On the one hand, it hurts record sales. On the other hand, it increases sales of its complements. To quantify the effect of music piracy, I construct a unique survey data set and use a Bayesian method to estimate the demand for music and iPods, and \uFB01nd three things. First, music piracy decreases music sales by 24% to 42%. Second, music piracy contributes 12% to iPod sales. Finally, counterfactual experiments show that, if music were free, the increase in Apple\u2019s pro\uFB01ts from iPod can more than compensate the loss of musicians. The last result implies that a Pareto improving iPod tax is possible."
  fulltext_hash: f0f7ed9b6eaec17e3637df1982260f316929eb57ffc3445509bf6f1aecc0fe01
  fulltext_excerpt: "Music piracy: Bad for record sales but good for the iPod?\nTin Cheuk Leung\nChinese University of Hong Kong, Hong Kong\narticle info\nArticle history:\nReceived 11 June 2013\nReceived in revised form 16 March 2015\nAccepted 15 April 2015\nAvailable online 23 April 2015\nKeywords:\nDemand estimation\niPod\nMusic piracy\nabstract\nMusic piracy is a double-edged sword for the music industry. On the one hand, it hurts\nrecord sales. On the other hand, it increases sales of its complements. To quantify the effect\nof music piracy, I construct a unique survey data set and use a Bayesian method to estimate\nthe demand for music and iPods, and \uFB01nd three things. First, music piracy decreases music\nsales by 24% to 42%. Second, music piracy contributes 12% to iPod sales. Finally, counterfac-\ntual experiments show that, if music were free, the increase in Apple\u2019s pro\uFB01ts from iPod can\nmore than compensate the loss of musicians. The last result implies that a Pareto\
    \ improv-\ning iPod tax is possible.\n/C2112015 Elsevier B.V. All rights reserved.\n1. Introduction\nIn 1999, record sales started to decline after more than\na decade of steady growth. The very same year, Napster,\nthe \uFB01rst peer-to-peer (P2P) software used for pirating\nmusic, began operations. While there are other factors that\nmight lead to a decline in record sales, 1 there is almost a\nconsensus in the economics literature that music piracy\nhas led to the decline (see Blackburn (2004), Liebowitz\n(2006), Peitz and Waelbroeck (2004), Rob and Waldfogel\n(2006), Waldfogel (2010), and Zentner (2006) . Smith and\nTelang (2012) provide a more recent review of the\nliterature.).2\nAlthough, as noted, many economists argue that music\npiracy hurts record sales, Oberholzer-Gee and Strumpf\n(2010) argue that it can increase revenue from music com-\nplements such as concerts. When music piracy drives the\neffective price of an album down to nearly zero, more\nconsumers become familiar\
    \ with the artist\u2019s music, thus\ndriving up demand for concerts. Mortimer et al. (2012)\nshow empirically that music piracy has a signi\uFB01cant effect\non concert demand, particularly for small artists. Concerts\nare not the only music complements to bene\uFB01t from music\npiracy. Fig. 1 shows that the revenue of iPod, the most pop-\nular MP3 player by far, has increased considerably when\nmusic piracy becomes more widespread. Although record\nsales have declined by more than 25% since Napster was\nlaunched, Apple has seen exponential growth in iPod sales\nsince the device was introduced in 2001. Revenue from\niPod sales grew from $344 million in 2003 to $7.6 billion\nin 2006.\nNetanel (20"
