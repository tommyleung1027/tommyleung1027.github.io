  abstract: 'Hong Kong housing data to attribute the level of price dispersion to macroeconomic factors like interest rates. They also find that the level of price dispersion is positively correlated with trading volume. In this paper, we present a simple model in which buyers anchor the value of a housing unit with its previous purchase price (the price of the previous transaction) and sellers are averse to loss. The model implies both 1) positive correlation between prices and trading volume and 2) positive correlation between price dispersion and price. Using data from the Hong Kong second-hand housing market, we show that the presence of both anchoring and loss aversion can explain the observed cycles in the housing market. We ask whether buyers anchor the value of a housing unit with its previous purchase price. When a rational buyer decides whether to buy a housing unit, the buyer inquires on the characteristics of the housing unit and then compares the price with that of other housing
    units. Unless the initial price contains information on the unobserved characteristics of a housing unit (which the buyer may want to learn), the initial purchase price should not matter here. We make use of a sample of repeated sales to control for the unobserved characteristics, and find that buyers'' decision still depends on the initial purchase price. We argue that there is a strong anchoring effect in the Hong Kong housing market. A related, though not identical, concept is loss aversion. The effect is related to the timing of the seller of putting the housing unit to the market: homeowners tend to sell housing units when there is a gain in nominal value instead of a loss. Homeowners with loss aversion have asymmetric attitudes toward gains and losses and use the previous purchase price as a reference point to make their selling decision. If the seller is rational, the previous purchase price is only relevant for calculating the sunk cost and it should not affect the seller''s
    behavior. Using the same sample of repeated sales in the Hong Kong housing market, we find that homeowners are strongly loss averse. After showing the existence of anchoring and loss aversion in the Hong Kong p'
  fulltext_hash: 6e56b5b8d78c93c7229df29e3fd44dfe01435baaf1120decd5febe8bc0f7619b
  fulltext_excerpt: "Anchoring and loss aversion in the housing market: Implications\non price dynamics \u2606\nTin Cheuk LEUNG a, Kwok Ping TSANG b,\u204E\na Department of Economics, Chinese University of Hong Kong, 914, Esther Building, Shatin, Hong Kong\nb Department of Economics, Virginia Tech, Pamplin Hall (0316), Blacksburg, VA 24061, USA\narticle info abstract\nArticle history:\nReceived 28 February 2012\nReceived in revised form 5 October 2012\nAccepted 22 October 2012\nAvailable online 1 November 2012\nIn this paper we develop a simple model with anchoring and loss aversion to explain house\nprice dynamics. The model has two testable implications: 1) when both cognitive biases are\npresent, price dispersion and trade volume are pro-cyclical; 2) if anchoring decreases with\ntime, then price dispersion and trade volume are higher for transactions with a previous\npurchase that is more recent. Using a data set that contains most real estate transactions in\nHong Kong from 1992 to 2006,\
    \ we find anchoring and loss aversion to be important, and the\nresults are robust to type of housing and sample period. The finding is consistent with the\nstrong correlations among house price, price dispersion, and volume found in the data.\nMoreover, anchoring, price dispersion and volume decrease with time since previous\ntransaction. Our results suggest that anchoring and loss aversion contribute to the cyclicality\nof the housing market.\n\xA9 2012 Elsevier Inc. All rights reserved.\nJEL classification:\nR31\nD03\nKeywords:\nPrice dispersion\nAnchoring\nLoss aversion\nHousing market\n1. Introduction\nContrary to what Lucas (1978) suggests, there is well-documented evidence that trading volume and price are positively\ncorrelated in asset markets. 1 To explain the correlation in the housing market, Stein (1995) shows that in a housing demand\nmodel with down-payment requirement, an exogenous negative shock to house price can have a large and broad-based negative\nimpact on household\
    \ liquidity and lead to a lower transaction volume. By simulating a search model in which sellers differ by\ntheir time on the market, Berkovec and Goodman (1996) generate the correlation among demand, turnover and prices over time.\nLeung, Lau, and Leong (2002) empirically test the two models above and argue that the findings, based on Hong Kong housing\ntransaction data, are more consistent with the predictions of the search theoretical model. Genesove and Mayer (2001) use\nhousing data in Boston in the 1990s to empirically show that house sellers are loss averse, and loss aversion can explain the\ncorrelation between price and volume.\nA less-documented fac"
