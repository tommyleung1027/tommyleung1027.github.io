- id: pub-love-thy-neighbor-income-distribution-and-housing-preferences
  title: 'Love Thy Neighbor: Income Distribution and Housing Preferences,'
  authors:
  - Leung
  - T.C.
  - K.P. Tsang
  year: 2012
  date: '2012'
  type: publication
  external_url: http://www.sciencedirect.com/science/article/pii/S105113771200054X
  pdf_path: /papers/publications/Love%20thy%20neighbor-%20Income%20distribution%20and%20housing%20preferences.pdf
  abstract: "Do homeowners prefer living in an area with a more equal distribution of income? We answer this question by estimating a semi-parametric hedonic pricing model for about 90,000 housing units transacted in Hong Kong between 2005 and 2006. We \uFB01rst identify a hedonic price function by locally regressing the rental price of the housing unit on its intrinsic and neighborhood characteristics, one of which is the Gini coef\uFB01cient for household income of the constituency area. We then combine the estimates with a log utility function to obtain the heterogeneous preference parameters. Finally, we estimate the joint distribution of the preference parameters and demographics. We \uFB01nd that most homeowners have a strong distaste for inequality in their neighborhood, and the distaste increases with income and goes down with education level. Counterfactual experiments show that reallocating public rental housing by half can increase the welfare of homeowners by about HK$8,000 on\
    \ average per year, an amount which is equivalent to increasing the housing unit by 20 square feet or reducing the age of the unit by 5 years."
  fulltext_hash: 69db9f0233a2adfa51b3d198bc8805e95b0e9f1b42c9ed0d9a267cf58facc361
  fulltext_excerpt: "Love thy neighbor: Income distribution and housing preferences\nTin Cheuk Leung a,\u21D1, Kwok Ping Tsang b\na Department of Economics, Chinese University of Hong Kong, Room 914, Esther Lee Building, Chung Chi Campus, Shatin, Hong Kong\nb Department of Economics, Virginia Tech, Pamplin Hall (0316), Blacksburg, VA 24061, United States\narticle info\nArticle history:\nReceived 16 June 2011\nAvailable online 16 August 2012\nJEL classi\uFB01cation:\nR21\nR23\nR32\nKeywords:\nHedonic pricing\nHousing\nIncome inequality\nabstract\nDo homeowners prefer living in an area with a more equal distribution of income? We\nanswer this question by estimating a semi-parametric hedonic pricing model for about\n90,000 housing units transacted in Hong Kong between 2005 and 2006. We \uFB01rst identify\na hedonic price function by locally regressing the rental price of the housing unit on its\nintrinsic and neighborhood characteristics, one of which is the Gini coef\uFB01cient for house-\n\
    hold income of the constituency area. We then combine the estimates with a log utility\nfunction to obtain the heterogeneous preference parameters. Finally, we estimate the joint\ndistribution of the preference parameters and demographics. We \uFB01nd that most homeown-\ners have a strong distaste for inequality in their neighborhood, and the distaste increases\nwith income and goes down with education level. Counterfactual experiments show that\nreallocating public rental housing by half can increase the welfare of homeowners by about\nHK$8,000 on average per year, an amount which is equivalent to increasing the housing\nunit by 20 square feet or reducing the age of the unit by 5 years.\n/C2112012 Elsevier Inc. All rights reserved.\n1. Introduction\n\u2018\u2018How seldom we weigh our neighbor in the same balance\nwith ourselves\u2019\u2019\nOf the Imitation of Christ , Thomas \xE0 Kempis\n(1418).\nDo homeowners have a preference for living among\nneighbors with a similar income level?\
    \ Common sense\nsuggests that homeowners prefer income equality in the\nneighborhood. There is the alleged snobbery of the rich to-\nwards the poor and the reciprocal jealousy of the poor to-\nwards the rich. Recent neural science research has also\nshown that humans have social preferences to reduce\ninequality in outcome distributions (see Tricomi et al.,\n2010). According to one sociological research by Gans\n(1961), \u2018\u2018People with higher incomes and more education\nmay feel that they or their children are being harmed by\nliving among less advantaged neighbors. The latter are\nlikely to feel equally negative about the \u2018airs\u2019 being put\non by the former ... \u2019\u2019. In this paper we give a quantitative\nanswer"
