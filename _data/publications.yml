- id: pub-to-root-or-not-to-root-the-economics-of-jailbreak
  title: To Root or Not to Root? The Economics of Jailbreak,
  authors:
  - Chao
  - H.
  - C.Y. Ho
  - T.C. Leung
  - Travis Ng
  year: 2017
  date: '2017'
  type: publication
  external_url: http://www.sciencedirect.com/science/article/pii/S0147596716300397
  pdf_path: /papers/publications/To%20root%20or%20not%20to%20root%3F%20The%20economics%20of%20jailbreak.pdf
  abstract: "Chao, Hong, Ho, Chun-Yu, Leung, Tin Cheuk, and Ng, Travis \u2014To root or not to root? The economics of jailbreak We construct a structural model that allows us to jointly estimate the demand for smartphones and paid apps using a Bayesian approach. Our data comes from more than 500 college students in Hong Kong and Shanghai. We \uFB01nd that the utility cost rather than the upfront monetary cost of jailbreaking smartphones determines its prevalence. Users mainly jailbreak smartphones to use paid apps for free, a reason more important among Android users than iPhone users. Paid apps contribute the lion\u2019s share of the pro\uFB01ts (between 66% and 59%) for both the Android and iPhone. Strictly prohibiting jailbreaking would decrease the aggregate market share of smartphones in the cell phone market. Apple, however, would sell even more iPhones at the expense of Android smartphones. Journal of Comparative Economics 45 (2017) 4 81\u20134 97. Shanghai Jiao Tong University, China;\
    \ Wake Forest University, US; The Chinese University of Hong Kong, China; University at Albany, SUNY, USA."
  fulltext_hash: 77ba30bc5307bd61fc6ae652ec5772c29ea273e3b0a57a3dc910bacd7eb73313
  fulltext_excerpt: "Journal of Comparative Economics 45 (2017) 4 81\u20134 97\nContents lists available at ScienceDirect\nJournal of Comparative Economics\njournal homepage: www.elsevier.com/locate/jce\nTo root or not to root? The economics of jailbreak\nHong Chao a , Chun-Yu Ho a , d , Tin Cheuk Leung b , Travis Ng c , \u2217\na Shanghai Jiao Tong University, China\nb Wake Forest University, US\nc The Chinese University of Hong Kong, China\nd University at Albany, SUNY, USA\na r t i c l e i n f o\nArticle history:\nReceived 8 July 2015\nRevised 29 July 2016\nAccepted 1 August 2016\nAvailable online 5 August 2016\nJEL Classi\uFB01cation:\nL14\nL86\nK42\nO34\nKeywords:\nJailbreak\nDemand estimation\nSmartphones\nApp demand\na b s t r a c t\nChao, Hong , Ho, Chun-Yu , Leung, Tin Cheuk , and Ng, Travis \u2014To root or not to root? The\neconomics of jailbreak\nWe construct a structural model that allows us to jointly estimate the demand for smart-\nphones and paid apps using a Bayesian approach.\
    \ Our data comes from more than 500\ncollege students in Hong Kong and Shanghai. We \uFB01nd that the utility cost rather than the\nupfront monetary cost of jailbreaking smartphones determines its prevalence. Users mainly\njailbreak smartphones to use paid apps for free, a reason more important among Android\nusers than iPhone users. Paid apps contribute the lion\u2019s share of the pro\uFB01ts (between 66%\nand 59%) for both the Android and iPhone. Strictly prohibiting jailbreaking would decrease\nthe aggregate market share of smartphones in the cell phone market. Apple, however,\nwould sell even more iPhones at the expense of Android smartphones. Journal of Com-\nparative Economics 45 (2017) 4 81\u20134 97. Shanghai Jiao Tong University, China; Wake Forest\nUniversity, US; The Chinese University of Hong Kong, China; University at Albany, SUNY,\nUSA.\n\xA92 0 1 6 Association for Comparative Economic Studies. Published by Elsevier Inc. All rights\nreserved.\n1. Introduction\nJailbreaking\
    \ is a process that unlocks restrictions on smartphones imposed by either the manufacturers or carriers. 1\nJailbreaking enables the user of a smartphone to personalize the phone settings (e.g., the strength of the Wi\uFB01 antenna).\nUsers of jailbroken iPhones can also sideload unauthorized apps, legal or illegal, from platforms other than the iTunes App\nStore. Jailbreaking can be deemed a violation of the 1998 Digital Millenium Copyright Act (DMCA). In 2010, the U.S. Library\nof Congress granted an exemption to jailbreaking from the DMCA, which the Apple Inc tried very hard to lobby against.\nThe exemption was renewed in 2012. During the hearings and public comments surrounding the 2012 exemption,"
