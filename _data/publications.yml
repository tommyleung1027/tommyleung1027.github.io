- id: pub-can-restricting-property-use-be-value-enhancing-evidence-from-short-term-rental-regulations
  title: Can Restricting Property Use Be Value Enhancing? Evidence from Short-Term Rental Regulations,
  authors:
  - Kim
  - J.H.
  - T.C. Leung
  - L. Wagman
  year: 2017
  date: '2017'
  type: publication
  external_url: http://www.journals.uchicago.edu/doi/pdfplus/10.1086/694415
  pdf_path: /papers/publications/Can%20Restricting%20Property%20Use%20Be%20Value%20Enhancing%3F%20Evidence%20from%20Short-Term%20Rental%20Regulation.pdf
  abstract: "Short-term rentals, private residences where tourists stay, have become ubiquitous over the past decade. Many communities are divided over the trade-offs between a property owner\u2019s rights and nuisance problems created by transient populations in residential neighborhoods. This paper empirically examines the effects of regulation restricting short-term rentals on property sales prices, us - ing a unique data set and policy experiment from Anna Maria Island, Florida. We show that nonresident ownership of properties on the island decreased fol - lowing the rental regulation and that the regulation decreased property values except in areas where the density of non-resident-owned properties in a neigh - borhood was quite high."
  fulltext_hash: 9513d1fef9201ed8e1fb5c0488717337affd3520f4b422b0a84ef3440d67a629
  fulltext_excerpt: "309\n[ Journal of Law and Economics, vol. 60 (May 2017)]\n\xA9 2017 by The University of Chicago. All rights reserved. 0022-2186/2017/6002-0010$10.00\nCan Restricting Property Use Be Value\nEnhancing? Evidence from Short-Term\nRental Regulation\nJin-Hyuk Kim University of Colorado Boulder\nTin Cheuk Leung Wake Forest University\nLiad Wagman Illinois Institute of Technology\nAbstract\nShort-term rentals, private residences where tourists stay, have become ubi-\nquitous over the past decade. Many communities are divided over the trade-offs\nbetween a property owner\u2019s rights and nuisance problems created by transient\npopulations in residential neighborhoods. This paper empirically examines the\neffects of regulation restricting short-term rentals on property sales prices, us -\ning a unique data set and policy experiment from Anna Maria Island, Florida.\nWe show that nonresident ownership of properties on the island decreased fol -\nlowing the rental regulation and\
    \ that the regulation decreased property values\nexcept in areas where the density of non-resident-owned properties in a neigh -\nborhood was quite high.\n1. Introduction\nWith the advent of online platforms such as Airbnb and HomeAway, vacation\nrentals\u2014renting privately owned, furnished homes, apartments, or rooms on\na short-term basis\u2014have become an important issue in many municipalities\naround the world. 1 While short-term rentals have become a lucrative alterna -\ntive to longer-term leasing to tenants for property owners, the influx of transient\npopulations can cause nuisances that neighboring residents dislike. Presently, a\nWe thank Sam Peltzman, an anonymous referee, seminar participants at Virginia Polytechnic\nInstitute and State University and the South Carolina Applied Micro Day conference, and Andrey\nFradkin for their suggestions and comments. We are also grateful to Stacey Johnston (Holmes Beach\ncity clerk), Lori Kee (Holmes Beach deputy city clerk), Bill\
    \ Brisson (Holmes Beach city planner),\nPatricia Petruff (Holmes Beach city attorney), and Billi Gartman (Anna Maria Life Realty) for corre-\nspondence. The usual disclaimer applies.\n1 According to Sena, McNellis, and McDade (2015), the market for vacation rentals and alter -\nnative lodging is estimated to be roughly $100 billion annually, with about two-thirds of vacation\nrentals being directly managed by property owners (for rent by owner) and the remaining one-third\nbeing managed by property-management companies.\n\n310 The Journal of LAW & ECONOMICS\nfast-growing number of regulations purporting to balance the interests of resi -\ndent and nonresident owners is b"
