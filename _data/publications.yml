- id: pub-globalization-and-the-rise-of-action-movies-in-hollywood
  title: Globalization and the Rise of Action Movies in Hollywood,
  authors:
  - Leung
  - T.C.
  - S. Qi
  year: 2023
  date: '2023'
  type: publication
  external_url: https://doi.org/10.1007/s10824-021-09438-z
  pdf_path: /papers/publications/Globalization%20and%20the%20rise%20of%20action%20movies%20in%20hollywood.pdf
  abstract: "This paper shows that Globalization contributes significantly to the rise of Action movies in Hollywood. Incorporating both the intensive and extensive margins in trade, this paper develops a structural model to allow movie-quality production heterogeneity across genres and countries. The paper finds that Hollywood studios respond to export-market expansion by tailoring their products to international consumers\u2019 preferences. As a result, Hollywood increasingly focuses on a few blockbusters, overwhelmingly in the Action genre. The movie industry becomes significantly more concentrated both domestically and abroad. Furthermore, a disproportionate increase in Action movies raises consumer welfare in some countries at other regions\u2019 expense."
  fulltext_hash: 76d5fb3884c976b8103eea2dde8b3d693b69214e3e8430a473984d83f05403f2
  fulltext_excerpt: "Vol.:(0123456789)\nJournal of Cultural Economics (2023) 47:31\u201369\nhttps://doi.org/10.1007/s10824-021-09438-z\n1 3\nORIGINAL ARTICLE\nGlobalization and the rise of action movies in hollywood\nTin Cheuk Leung1 \xB7 Shi Qi2\nReceived: 5 November 2021 / Accepted: 16 November 2021 / Published online: 14 January 2022\n\xA9 The Author(s), under exclusive licence to Springer Science+Business Media, LLC, part of Springer Nature\n2021\nAbstract\nThis paper shows that Globalization contributes significantly to the rise of Action\nmovies in Hollywood. Incorporating both the intensive and extensive margins in\ntrade, this paper develops a structural model to allow movie-quality production\nheterogeneity across genres and countries. The paper finds that Hollywood studios\nrespond to export-market expansion by tailoring their products to international\nconsumers\u2019 preferences. As a result, Hollywood increasingly focuses on a few\nblockbusters, overwhelmingly in the Action\
    \ genre. The movie industry becomes\nsignificantly more concentrated both domestically and abroad. Furthermore, a dis-\nproportionate increase in Action movies raises consumer welfare in some countries\nat other regions\u2019 expense.\nKeywords Globalization \xB7 Movies \xB7 Budget reallocation \xB7 Quality heterogeneity\n1 Introduction\nIn the past twenty-five years, the movie industry in Hollywood has experienced two\ntectonic shifts.1 First, movies of the Action genre have become dominant at the box-\noffice.2 Their aggregate domestic market share has increased by almost 20 percent\nWe would like to thank Amil Petrin and seminar participants at the CEIBS, CMES, SCAM\u2019d, IIOC,\nSEA Meetings, College of William and Mary for useful comments. The usual disclaimer applies.\n* Shi Qi\nshiqi.econ@gmail.com\n1 Wake Forest University, Winston-Salem, USA\n2 Economics Department, William and Mary, 300 James Blair Drive, Chancellors Hall Room\n248, Williamsburg, VA 23185, USA\n1 In the paper,\
    \ we use the term \u201CHollywood movies\u201D to refer to US-produced movies or movies of US-\norigin.\n2 In the paper, the \u201CAction\u201D genre includes movies classified as either action or adventure films, as these\ngenres have significant overlaps.\n\n32 Journal of Cultural Economics (2023) 47:31\u201369\n1 3\nand accounts for more than half of the total box-office revenue in the USA. Second,\nHollywood has become increasingly reliant on foreign markets. The US share of the\nworldwide box-office revenue has declined from almost 60 percent in the mid-1990s\nto less than 40 percent in 2016.\nTo explain these two parallel developments in the movie industry, this paper\nasks two important questions. First, how"
