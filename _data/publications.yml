- id: pub-dispersion-and-distortions-in-the-trans-atlantic-slave-trade
  title: Dispersion and Distortions in the Trans-Atlantic Slave Trade,
  authors:
  - Dalton J.T.
  - T.C. Leung
  year: 2015
  date: '2015'
  type: publication
  external_url: http://authors.elsevier.com/sd/article/S0022199615000562
  pdf_path: /papers/publications/Dispersion%20and%20distortions%20in%20the%20trans-Atlantic%20slave%20trade.pdf
  abstract: "(1968) and Eltis and Richardson (1995).2 But, dispersion in productivity may not capture everything. The dispersion in institutional inef \uFB01ciencies can cause resource misallocation, which may be important because of its impact on a country's TFP in the slave trade. To uncover relative institutional inef \uFB01ciencies, we use the framework developed by Chari et al. (2007) and applied by Hsieh and Klenow (2009) and Song and Wu (2013), among others. This framework, which is commonly used in macroeconomics, identi \uFB01es market distortions from wedges in \uFB01rst order conditions. To the best of our knowledge, our paper represents the \uFB01rst application of this structural approach in the literature on the African slave trades. In particular, we assume that voyage owners are price takers in both the slaves and input markets. We then consider a decision problem for a voyage owner in which he chooses the amount of labor and capital necessary to produce slaves and maximize\
    \ pro \uFB01ts. Voyage-speci \uFB01c distortions in the slaves and input markets enter a voyage owner's decision problem in the form of wedges. These wedges represent the combination of taxes, regulations, and all other types of market distortions faced by individual voyage owners. When the dispersion in market distortions is high, it means that the degree of differential access in the slaves and input markets is high across individual voyage owners, which leads to a higher degree of resource misallocation and represents less ef\uFB01cient institutions.3 In an environment in which institutions are perfect, or market distortions do not exist, labor-output, capital-output, and labor \u2013capital ratios would be constant across voyages. We then make use of the actual dispersion of labor-output, capital-output, and labor\u2013capital ratios across voyages in the data to structurally identify the dispersion of distortions in the product, labor, and capital markets in Great Britain, France,\
    \ and Portugal separately. Overall, we \uFB01nd that the dispersion of distortions in the product market is higher than the dispersion in labor and capital market distortions. The dispersion in the Portuguese product market distortions is the highest, followed by Fr"
  fulltext_hash: ca3eed3b4410067cd4275f258784786d8b80563fcd1c88191b05e49a1044f7b2
  fulltext_excerpt: "Dispersion and distortions in the trans-Atlantic slave trade \u2606\nJohn T. Dalton a,\u204E,T i nC h e u kL e u n gb\na Department of Economics, Wake Forest University, Kirby Hall, Box 7505, Winston-Salem, NC 27109, United States\nb Department of Economics, Chinese University of Hong Kong, 914, Esther Lee Building, Chung Chi Campus, Shatin, Hong Kong\nabstractarticle info\nArticle history:\nReceived 6 February 2013\nReceived in revised form 13 March 2015\nAccepted 13 March 2015\nAvailable online 21 March 2015\nJEL classi\uFB01cation:\nN77\nF14\nF54\nKeywords:\nSlave trades\nMarket distortions\nOutput dispersion\nProductivity\nMarket distortions can lead to resource misallocation, which can further lead to inef \uFB01ciency. Throughout the\nhistory of the trans-Atlantic slave trade, qualitative evidence of various sources of distortion abounds. No\nstudy, however, has quanti\uFB01ed the inef\uFB01ciency in the slave trade due to these distortions. We use a structural\n\
    approach to identify the dispersion of distortions in the slave trade from wedges in \uFB01rst order conditions. We\nthen calculate the TFP gains had the dispersion of distortions disappeared. Two main results emerge. First,\ndispersion of distortions had the smallest damage to TFP in Great Britain, followed by Portugal, and then\nFrance. Second, dispersion of distortions in the product market had a bigger impact on TFP than that of the capital\nand labor markets.\n\xA9 2015 Elsevier B.V. All rights reserved.\n1. Introduction\nThe institutional ef \uFB01ciency of different countries has long been a\nresearch topic for economic historians. Substantial evidence suggests\nthat various distortions have existed in labor, credit, and product\nmarkets across and within major European countries throughout histo-\nry. For instance, the wage dispersion across major European cities\ndocumented by Phelps Brown and Hopkins (1981) is one indicator of\nlabor market inef\uFB01ciency before the 1900s.\
    \ While there are studies on\ninstitutional inef \uFB01ciencies for the whole of Europe or in speci \uFB01c\nEuropean countries such as Great Britain, there are few quantitative\nstudies on the relative institutional inef\uFB01ciencies of different European\ncountries prior to the Industrial Revolution.\nThis paper aims to \uFB01ll this hole in the literature by studying a large\nscale trading system between Europe, Africa, and the New World: the\ntrans-Atlantic slave trade. The slave trade is ideal for such a study for\nseveral reasons. First, many Western European countries participated\nin slave trading, such as Great Britain, France, and Portugal. This allows\nus to compare the relative performance of voyages across co"
