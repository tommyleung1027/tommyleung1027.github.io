  abstract: "This paper studies a regulatory change that significantly increases the prices of residential building renovation. In Hong Kong, where most people live in high-density condominiums, owners\u2019 corporation arranges tender process to choose contractors on behalf of all homeowners when common areas of a building need maintenance and repair. Since 2012, the government has mandated selected buildings to finish such renovations within a year. Using propensity score matching method, we find that homeowners who"
  fulltext_hash: d76aa2d2bf35f21d35a7a912596570a6481d608c61c6eca092071913b87dc5b7
  fulltext_excerpt: "1\nCollusion in Private Procurement: How Does Mandatory Building Repair Increase Renovation Prices?* Tin Cheuk Leung Wake Forest University leungtc@wfu.edu\nKwok Ping Tsang Virginia Tech byront@vt.edu October 6, 2018\nKevin K. Tsui Clemson University ktsui@clemson.edu\nAbstract This paper studies a regulatory change that significantly increases the prices of residential building renovation. In Hong Kong, where most people live in high-density condominiums, owners\u2019 corporation arranges tender process to choose contractors on behalf of all homeowners when common areas of a building need maintenance and repair. Since 2012, the government has mandated selected buildings to finish such renovations within a year. Using propensity score matching method, we find that homeowners who received statutory notices to repair their building paid 40 percent more in bid price compared with those who did it voluntarily. After the mandatory scheme was introduced, all homeowners on\
    \ average paid 40 percent more, and those who received the notices paid even higher prices. Moreover, these increases in prices are more pronounced in districts where condominiums are more expensive and residents are more educated. Finally, the major contractors\u2019 bids became more correlated after the introduction of the mandatory scheme, suggesting that the scheme may have helped promote bid rigging and corruption among contractors and owners\u2019 corporations. JEL codes: K21, L12, R21 Keywords: Housing regulations, bid-rigging, private procurement\n* Leung is the corresponding author. We thank Factwire for collecting and generously providing the data. We would like to thank Bill Dougan, Sergey Mityakov, Alec Smith and seminar participants at Clemson University, the Competition Commission of Hong Kong, and the University of Texas at El Paso for helpful comments.\n\n2\n1. Introduction It is widely recognized that building regulations, like zoning and environmental requirements,\
    \ restrict housing supply and hence increase home prices. Although housing is a durable good, much less attention has been paid to regulations on maintenance and repair. In this paper, we examine how one such regulation imposes substantial costs on homeowners, and we also document how the increased price of building renovation is related to the bid rigging and corruption among contractors and owners\u2019 corporations. In Hong Kong, most people live in condominiums of high density. When common areas (e.g., the external walls) of a building in Hong Kong need maintenance and repair, a contractor from the renovation market is chosen through a tende"
