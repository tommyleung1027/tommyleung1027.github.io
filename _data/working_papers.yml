  authors:
  - Tin Cheuk Leung
  - Kwok Ping Tsang
  year: 2025
  date: Dec 2025
  type: working_paper
  external_url: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=5923585
  pdf_path: /papers/working%20papers/%23EconTwitter%20and%20Elon%20Musk-%20Anatomy%20of%20a%20Failed%20Exodus.pdf
  abstract: "We study the attempted migration of the #EconTwitter community from Twitter/X to Mastodon following Elon Musk\u2019s acquisition of the platform. Leveraging a dataset of 4.3 million tweets from over 2,000 economists\u2014including detailed records of their weekly activity and network-mediated exposure to peers\u2019 Mastodon-related retweets\u2014we examine how peer discussions relate to platform engagement. In a difference-in-differences framework, we estimate that greater exposure to Mastodon-related discussions is followed by a short-run decline in activity on Twitter/X. However, this relationship attenuates substantially when we control for economist fixed effects or examine longer-run behavior. Two years later, economists with higher Mastodon exposure are somewhat more likely to multi-home across platforms but only marginally less active on Twitter/X. These findings highlight the strength of network effects and the difficulty of disrupting incumbent platforms, even during\
    \ periods of widespread discontent."
  fulltext_hash: 23f842aa35cecd23b6690d8a72352a7c2f66b59037119410ab2e77aa9ab89a16
  fulltext_excerpt: "#EconTwitter and Elon Musk:\nAnatomy of a Failed Exodus *\nTin Cheuk Leung1 and Kwok Ping Tsang2\n1Wake Forest University (leungtc@wfu.edu)\n2Virginia Tech (byront@vt.edu)\nDecember 14, 2025\nAbstract\nWe study the attempted migration of the #EconTwitter community from Twitter/X\nto Mastodon following Elon Musk\u2019s acquisition of the platform. Leveraging a dataset of\n4.3 million tweets from over 2,000 economists\u2014including detailed records of their weekly\nactivity and network-mediated exposure to peers\u2019 Mastodon-related retweets\u2014we examine\nhow peer discussions relate to platform engagement. In a difference-in-differences frame-\nwork, we estimate that greater exposure to Mastodon-related discussions is followed by\na short-run decline in activity on Twitter/X. However, this relationship attenuates substan-\ntially when we control for economist fixed effects or examine longer-run behavior. Two years\nlater, economists with higher Mastodon exposure\
    \ are somewhat more likely to multi-home\nacross platforms but only marginally less active on Twitter/X. These findings highlight the\nstrength of network effects and the difficulty of disrupting incumbent platforms, even during\nperiods of widespread discontent.\nJEL Classification:\nKeywords: Network effects, social media, Twitter/X, EconTwitter.\n*We would like to thank Rubaiyat Alam and seminar participants at CREED and SEA for helpful comments.\nWe also thank the Institute for Humane Studies for financial support and Munkhchimeg Sukhee and Eric Uehling\nfor research assistance. The usual disclaimer applies.\n1\n\n1 Introduction\nSocial media platforms derive much of their value from network effects, with Twitter (now X)\noffering a quintessential example, boasting 237.8 million monetizable daily active users as of Q2\n2022 [Twitter, Inc., 2022]. The platform\u2019s dominance stems from its large user base of content\nproviders and intricate social connections\u2014personal friends\
    \ and influencers\u2014creating strong\nincentives for user retention [Ellison et al., 2007]. These network effects generate economies of\nscale, reinforcing Twitter/X\u2019s market dominance and acting as a barrier to competitors [Econo-\nmides, 1996a]. For users, this creates lock-in: when colleagues and influential figures remain,\nswitching platforms is less appealing [Zhu and Iansiti, 2012]. Isolated exit attempts rarely dis-\nrupt Twitter/X\u2019s position, but a major platform shock can, in principle, weaken this lock-in\n[Arthur, 1989].\nThis paper examines such a shock by analyzing the attempted and ultimately failed\n#EconTwitter exodus from Twitter/X. We assemble a dataset of 4.3 milli"
