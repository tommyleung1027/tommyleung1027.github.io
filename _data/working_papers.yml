  title: An Empirical Decomposition of Information vs Sentiment Shifts in Advertising
  authors:
  - Tin Cheuk Leung
  - Shi Qi
  - Koleman Strumpf
  year: 2025
  date: Jun 2025
  type: working_paper
  external_url: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=5297093
  pdf_path: /papers/working%20papers/An%20Empirical%20Decomposition%20of%20Information%20vs%20Sentiment%20Shifts%20in%20Advertising.pdf
  abstract: 'Advertising influences market expectations through three distinct pathways: raising awareness, shaping sentiment, and providing information. This paper empirically disentangles these effects using movie trailers as an empirical setting, leveraging a dataset of nearly 600 wide-release U.S. films (2017-2021). We analyze how trailer releases affect pre-theatrical demand expectations, as reflected in Hollywood Stock Exchange (HSX) prices, and measure the three channels of consumer engagement through Twitter discussions and Wikipedia page views. Our findings show that trailers significantly boost HSX prices, particularly for non-sequels with lower prior awareness. While heightened engagement correlates with stronger market expectations, additional informational content can sometimes dampen enthusiasm. Moreover, trailer releases reduces uncertainty, as evidenced by a decline in HSX price volatility for non-sequels. By disentangling the three pathways of advertising influence, this
    study contributes to the literature on advertising effectiveness and offers actionable insights for marketers optimizing promotional strategies in a digital landscape.'
  fulltext_hash: 3f2d455204af559096a7c9b7626a94373efcc4ce10042ade4cda07901c5ec4ab
