  pdf_path: /papers/working%20papers/Quantifying%20Racial%20Prejudices%20with%20Housing%20Transaction%20Data.pdf
  abstract: This paper aims to quantify racial prejudices using transaction-level housing market data. We pin down the impact of a marginal change of racial composition in a narrowly-defined neighborhood on the price appreciation between repeated sales of a house, and we find that an additional nonwhite household within a radius of 0.2 miles reduces the price appreciation by 1.27 percentage points. The effects are weaker in neighborhoods with a thicker housing market and a higher income level, suggesting that the role of racial prejudices is limited by market forces. The effects are also associated with voting behaviors and public anti-racism statements made on social media, indicating that they are likely to be driven by taste-based racial preferences. While we also find evidence of racial price discrimination effects as in the literature, these effects tend to be a form of statistical discrimination driven by other factors that correlate with race.
  fulltext_hash: 5966276310e480eba9f099da37091437aaf10fb0b2626c80bca5f71cceca83a7
  fulltext_excerpt: 'Quantifying Racial Prejudices with Housing Transaction Data *

    Tin Cheuk Leung1, Xiaojin Sun2, and Kwok Ping Tsang3

    1Wake Forest University (leungtc@wfu.edu)

    2Oklahoma State University (xiaojin.sun@okstate.edu)

    3Virginia Tech (byront@vt.edu)

    September 26, 2024

    Abstract

    This paper aims to quantify racial prejudices using transaction-level housing market data.

    We pin down the impact of a marginal change of racial composition in a narrowly-defined

    neighborhood on the price appreciation between repeated sales of a house, and we find that

    an additional nonwhite household within a radius of 0.2 miles reduces the price appreciation

    by 1.27 percentage points. The effects are weaker in neighborhoods with a thicker housing

    market and a higher income level, suggesting that the role of racial prejudices is limited by

    market forces. The effects are also associated with voting behaviors and public anti-racism

    statements made on social media, indicating that they are likely to be driven by taste-based

    racial preferences. While we also find evidence of racial price discrimination effects as in the

    literature, these effects tend to be a form of statistical discrimination driven by other factors

    that correlate with race.

    JEL Classification: J15, R23, R30, H00

    Keywords: Housing market, repeated sales, racial prejudices, machine learning.

    Data Availability: The data that support the findings of this study are available from Zillow

    but restrictions apply to the availability of these data, which were used under license for the

    current study, and so are not publicly available.

    *We would like to thank Zillow for providing us access to the Zillow Transaction and Assessment Dataset

    (ZTRAX). More information on accessing the data can be found at http://www.zillow.com/ztrax. The results and

    opinions are those of the authors and do not reflect the position of Zillow Group.

    1


    1 Introduction

    Housing is more than a consumption good; it involves neighborhood effects shaped by the

    behaviors and characteristics of residents. Preferences for quietness, community support, and

    safety often influence housing choices, alongside the neighborhood racial composition. Racial

    prejudices, i.e., preferences for or against certain racial groups, play a key role in these decisions.

    This paper quantifies such prejudice by analyzing how the price appreciation of a repeatedly

    transacted house is affected by changes in the racial composition of its immediate neighborhood

    using housing transaction data from the state of Virginia. 1

