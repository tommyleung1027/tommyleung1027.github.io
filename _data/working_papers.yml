  pdf_path: /papers/working%20papers/Disentangling%20Demand%20and%20Supply%20of%20Media%20Bias-%20The%20Case%20of%20Newspaper%20Homepages.pdf
  abstract: "We introduce a novel method for detecting supply-side media bias without needing information on the ideological leanings of media owners or editors. We analyze the most prominent part of media sites\u2014the digital homepage. Using data from over 100,000 articles from The New York Times (NYT) and The Wall Street Journal (WSJ), along with 24 million tweets, we examine what drives article duration on homepages. Controlling for demand-side factors, we find that ideologically slanted articles remain longer due to supply-side biases: liberal articles on the NYT and to a lesser extent conservative ones on the WSJ. Further analysis into articles\u2019 transition to print and podcasts suggest that competition may reduce media bias, as predicted by models of supply-side bias. Our approach can be applied to a range of media sites, and the estimates have implications for regulators."
