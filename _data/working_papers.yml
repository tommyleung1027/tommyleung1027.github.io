  type: working_paper
  external_url: https://papers.ssrn.com/sol3/papers.cfm?abstract_id=4075398
  pdf_path: /papers/working%20papers/All%20the%20Headlines%20that%20Are%20Fit%20to%20Change.pdf
  abstract: "We study how the New York Times changes headlines after an article has been published. We track the 35,000 articles on the newspaper\u2019s home page between February 2021 and April 2022, and find that 10% have an immediate headline change while another 11% undergo an A/B test where two titles are trialed against one another over a short time window. We also collect every tweet of an article in our data. We first look at which articles get a headline change of some form. Article type matters: popularity on Twitter, hard news, negative sentiment headline, and mentions from more partisan Twitter accounts are associated with headline changes. Another factor is social pressure, negative tweets from users connected to the reporter or the newspaper, which leads to more immediate headline changes and to a lesser extent to A/B tests. Next we examine how headline changes impact an article\u2019s performance metrics. After accounting for selection, we find that headline changes increase\
    \ an article\u2019s popularity. There is also evidence that headline changes increase the negative sentiment and liberal political slant when it is tweeted. We also analyze headline changes at the Wall Street Journal for a shorter period, and find comparable behavior. Our results have implications for distinguishing supply and demand driven models of media bias, how digitization may foster media consolidation, and conditions under which economic or partisan motives drive newspaper decision-making."
