    \ leungtc@wfu.edu\n\u2021Email: sqi01@wm.edu\n\xA7Email: strumpks@wfu.edu\n1\n\n1 Introduction\nAdvertising plays a critical role in shaping consumer perceptions and market behavior.\nThe literature identifies three distinct mechanisms through which advertising influences\nconsumer behavior and market expectations. First, it raises awareness by increasing\na product\u2019s visibility, a crucial function in markets with frequent new product launches.\nSecond, it shapes sentiment, evoking emotional responses such as humor, nostalgia, excite-\nment, or fear-particularly in industries where differentiation hinges on perception rather\nthan tangible attributes. Finally, advertising conveys specific"
