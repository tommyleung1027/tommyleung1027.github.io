name: Update Papers Metadata

on:
  push:
    branches:
      - main
    paths:
      - 'papers/working papers/**'
      - 'papers/publications/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-papers:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml pypdf

      - name: Build paper index
        run: python3 scripts/build_paper_index.py

      - name: Commit and push changes
        run: |
          if git diff --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _data/working_papers.yml _data/publications.yml _data/papers_autodraft.yml assets/search/papers_index.json
          git commit -m "Auto-update paper abstracts and search index"
          git push origin main
